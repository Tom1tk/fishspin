repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: debug-statements

  - repo: local
    hooks:
      - id: no-compiled-js-divergence
        name: app.js must not be older than app.jsx
        language: system
        entry: bash -c 'if [ static/app.jsx -nt static/app.js ]; then echo "static/app.js is stale — run make build"; exit 1; fi'
        pass_filenames: false
        always_run: true
