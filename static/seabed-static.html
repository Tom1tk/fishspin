<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seabed Background – Static</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width:100%;height:100vh;overflow:hidden;background:#042033;font-family:sans-serif; }

  #ocean {
    position:relative;width:100%;height:100%;
    background:radial-gradient(ellipse 90% 65% at 50% 5%,
        #62d0e0 0%,#28a0b8 20%,#0d6688 48%,#063d58 75%,#042033 100%);
    overflow:hidden;
  }
  #ocean::before {
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 180px 80px at 18% 12%,rgba(255,255,255,0.05) 0%,transparent 100%),
      radial-gradient(ellipse 100px 50px at 55% 7%, rgba(255,255,255,0.06) 0%,transparent 100%),
      radial-gradient(ellipse 160px 75px at 82% 18%,rgba(255,255,255,0.04) 0%,transparent 100%);
    pointer-events:none;
  }
  #terrain { position:absolute;bottom:0;left:0;width:100%;height:62%; }

  .bubble {
    position:absolute;border-radius:50%;pointer-events:none;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.24);
  }
  .swimmer {
    position:absolute;white-space:nowrap;line-height:1;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    transform:scaleX(-1);
  }
  .swimmer.rtl { transform:scaleX(1); }
  .school { position:absolute;pointer-events:none;transform:scaleX(-1);line-height:1; }
  .school.rtl { transform:scaleX(1); }
  .school span { display:inline-block;font-size:0.85rem;margin-right:3px;opacity:0.8; }
  .ghost {
    position:absolute;opacity:0.13;line-height:1;
    filter:blur(1.5px) grayscale(1);transform:scaleX(-1);
  }
  .ghost.rtl { transform:scaleX(1); }
  .plant { position:absolute;bottom:0;transform-origin:bottom center;line-height:1; }
  .plant.lean-r { transform:rotate(3deg) scaleY(1.02); }
  .plant.lean-l { transform:rotate(-3deg) scaleY(1.02); }
  .deco { position:absolute;pointer-events:none;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.35)); }
  .deco-mid { position:absolute;pointer-events:none;line-height:1;opacity:0.42;filter:blur(0.8px) grayscale(0.2) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .deco-far { position:absolute;pointer-events:none;line-height:1;opacity:0.18;filter:blur(2.2px) grayscale(0.5) drop-shadow(0 1px 3px rgba(0,0,0,0.4)); }
  .squid { position:absolute;pointer-events:none;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.3));transform:rotate(-3deg); }
</style>
</head>
