<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seabed Background – Animated</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #042033;
    font-family: sans-serif;
  }

  #ocean {
    position: relative;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse 90% 65% at 50% 5%,
        #62d0e0 0%, #28a0b8 20%, #0d6688 48%, #063d58 75%, #042033 100%);
    overflow: hidden;
  }

  /* Caustic light shimmer */
  #ocean::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 180px 80px  at 18% 12%, rgba(255,255,255,0.05) 0%, transparent 100%),
      radial-gradient(ellipse 100px 50px  at 55% 7%,  rgba(255,255,255,0.06) 0%, transparent 100%),
      radial-gradient(ellipse 160px 75px  at 82% 18%, rgba(255,255,255,0.04) 0%, transparent 100%);
    animation: caustics 9s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes caustics {
    0%   { opacity: 0.4; transform: scale(1)    translateX(0px); }
    100% { opacity: 1.0; transform: scale(1.06) translateX(18px); }
  }

  #terrain { position: absolute; bottom: 0; left: 0; width: 100%; height: 62%; }

  /* Bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.28);
    animation: rise linear infinite;
    pointer-events: none;
  }
  @keyframes rise {
    0%   { transform: translateY(0)     translateX(0px)  scale(1);    opacity: 0.55; }
    50%  { transform: translateY(-40vh) translateX(9px)  scale(1.05); opacity: 0.35; }
    100% { transform: translateY(-88vh) translateX(-6px) scale(0.65); opacity: 0;    }
  }

  /*
   * SWIM DIRECTION FIX
   * Emoji fish face LEFT by default.
   * LTR (left to right) = flip with scaleX(-1) so they face right.
   * RTL (right to left) = keep default, they face left correctly.
   */
  .swimmer {
    position: absolute;
    animation: swimLTR linear infinite;
    white-space: nowrap;
    will-change: left;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    transform: scaleX(-1);
  }
  .swimmer.rtl {
    animation-name: swimRTL;
    transform: scaleX(1);
  }
  @keyframes swimLTR {
    0%   { left: -12%; }
    100% { left: 112%; }
  }
  @keyframes swimRTL {
    0%   { left: 112%; }
    100% { left: -12%; }
  }

  /* Vertical bob — margin-top is independent of transform */
  .bob {
    animation-name: swimLTR, bob;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  .bob.rtl { animation-name: swimRTL, bob; }
  @keyframes bob {
    0%, 100% { margin-top: 0px;   }
    50%       { margin-top: -12px; }
  }

  /* Schools */
  .school {
    position: absolute;
    animation: swimLTR linear infinite;
    pointer-events: none;
    transform: scaleX(-1);
  }
  .school.rtl { animation-name: swimRTL; transform: scaleX(1); }
  .school span { display: inline-block; font-size: 0.85rem; margin-right: 3px; opacity: 0.8; }

  /* Ghost silhouettes */
  .ghost {
    position: absolute;
    opacity: 0.13;
    filter: blur(1.5px) grayscale(1);
    animation: swimLTR linear infinite;
    transform: scaleX(-1);
  }
  .ghost.rtl { animation-name: swimRTL; transform: scaleX(1); }

  /* Swaying plants */
  .plant {
    position: absolute;
    bottom: 0;
    transform-origin: bottom center;
    animation: sway ease-in-out infinite alternate;
    will-change: transform;
    line-height: 1;
  }
  @keyframes sway {
    0%   { transform: rotate(-4deg) scaleY(1);    }
    100% { transform: rotate( 4deg) scaleY(1.03); }
  }
  .plant.rev { animation-direction: alternate-reverse; }

  /*
   * THREE DEPTH TIERS
   * .deco      foreground: full size, sharp, full opacity
   * .deco-mid  mid-ground: smaller, slight blur, faded
   * .deco-far  far-ground: tiny,  heavy blur, very faded
   */
  .deco {
    position: absolute;
    pointer-events: none;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
    line-height: 1;
  }
  .deco-mid {
    position: absolute;
    pointer-events: none;
    line-height: 1;
    opacity: 0.42;
    filter: blur(0.8px) grayscale(0.2) drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .deco-far {
    position: absolute;
    pointer-events: none;
    line-height: 1;
    opacity: 0.18;
    filter: blur(2.2px) grayscale(0.5) drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }

  /* Squid — hovers gently in place above the seabed */
  .squid {
    position: absolute;
    pointer-events: none;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
    line-height: 1;
    animation: squidHover ease-in-out infinite alternate;
  }
  @keyframes squidHover {
    0%   { transform: translateY(0px)   rotate(-3deg); }
    100% { transform: translateY(-10px) rotate( 3deg); }
  }
</style>
</head>
